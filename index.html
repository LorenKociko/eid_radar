<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ραντεβού Radar — eid.gov.gr slot monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D1321;
    --panel: #151D30;
    --panel-2: #101828;
    --line: #26314B;
    --text: #E4EAF6;
    --muted: #8792A8;
    --blue: #4E9DE0;
    --amber: #F5A623;
    --green: #34C98E;
    --red: #E5484D;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
    --sans: "Inter", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    padding: 32px 16px 80px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }

  header { margin-bottom: 28px; }
  header h1 {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  header h1 .dot { color: var(--blue); }
  header p { color: var(--muted); margin-top: 4px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 14px;
  }

  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  textarea, select, input[type="number"] {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12.5px;
    padding: 8px 10px;
  }
  textarea { resize: vertical; min-height: 64px; }
  textarea:focus, select:focus, input:focus, button:focus-visible {
    outline: 2px solid var(--blue);
    outline-offset: 1px;
  }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  .row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 12px; }
  @media (max-width: 640px) { .row, .row-4 { grid-template-columns: 1fr; } }

  .deptlist {
    margin-top: 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--panel-2);
    max-height: 180px;
    overflow-y: auto;
    padding: 6px;
  }
  .deptlist:empty { display: none; }
  .deptlist .dept {
    display: flex;
    gap: 8px;
    align-items: baseline;
    padding: 5px 6px;
    border-radius: 4px;
    cursor: pointer;
  }
  .deptlist .dept:hover { background: rgba(78,157,224,0.08); }
  .deptlist .dept input { accent-color: var(--blue); }
  .deptlist .dept .addr { color: var(--muted); font-size: 11px; }

  .checkline { display: flex; align-items: center; gap: 8px; margin-top: 18px; font-size: 13px; color: var(--text); }
  .checkline input { accent-color: var(--blue); }

  .controls { display: flex; gap: 10px; flex-wrap: wrap; }
  button {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 9px 18px;
    cursor: pointer;
    background: var(--panel-2);
    color: var(--text);
  }
  button.primary { background: var(--blue); border-color: var(--blue); color: #0A1220; }
  button.danger { background: transparent; border-color: var(--red); color: var(--red); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }

  /* signature: status strip */
  .status {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 13px;
    padding: 14px 18px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--panel);
    margin-bottom: 16px;
  }
  .pulse {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .status.scanning .pulse { background: var(--blue); animation: pulse 1.2s ease-in-out infinite; }
  .status.waiting  .pulse { background: var(--green); animation: pulse 2.4s ease-in-out infinite; }
  .status.alert    .pulse { background: var(--amber); animation: pulse 0.6s ease-in-out infinite; }
  .status.dead     .pulse { background: var(--red); }
  @keyframes pulse { 50% { box-shadow: 0 0 0 7px rgba(78,157,224,0.18); } }
  @media (prefers-reduced-motion: reduce) { .pulse { animation: none !important; } }
  .status .count { margin-left: auto; color: var(--muted); }

  .banner {
    display: none;
    border: 1px solid var(--red);
    background: rgba(229,72,77,0.08);
    color: var(--text);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 16px;
    font-size: 13px;
  }
  .banner code {
    display: block;
    font-family: var(--mono);
    font-size: 11.5px;
    background: var(--panel-2);
    border-radius: 6px;
    padding: 8px 10px;
    margin-top: 8px;
    word-break: break-all;
    user-select: all;
  }

  /* results */
  .ticket {
    border: 1px solid var(--amber);
    background: rgba(245,166,35,0.07);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 10px;
  }
  .ticket .when {
    font-family: var(--mono);
    font-size: 17px;
    font-weight: 600;
    color: var(--amber);
  }
  .ticket .where { margin-top: 2px; }
  .ticket .addr { color: var(--muted); font-size: 12px; }

  .nearest {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 18px;
    background: var(--panel);
    margin-bottom: 16px;
  }
  .nearest .when { font-family: var(--mono); font-size: 15px; color: var(--blue); font-weight: 600; }
  .nearest .addr { color: var(--muted); font-size: 12px; }

  .log {
    font-family: var(--mono);
    font-size: 11.5px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    color: var(--muted);
  }
  .log .ok { color: var(--green); }
  .log .warn { color: var(--amber); }
  .log .err { color: var(--red); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>ΡΑΝΤΕΒΟΥ RADAR<span class="dot">_</span></h1>
    <p>Watches eid.gov.gr police appointment slots and beeps when one opens inside your window.</p>
  </header>

  <div class="banner" id="banner"></div>

  <div class="card">
    <h2>Session</h2>
    <div id="sessionLine" style="font-family:var(--mono);font-size:12.5px;color:var(--muted)">
      Checking session…
    </div>
    <textarea id="token" spellcheck="false" placeholder="ctaf2 DRXw3oaTl37au3xJ..."
      style="display:none;margin-top:10px"></textarea>
  </div>

  <div class="card">
    <h2>Where</h2>
    <div class="row">
      <div>
        <label for="region">Περιφέρεια (region)</label>
        <select id="region"></select>
      </div>
      <div>
        <label for="pref">Περιφερειακή ενότητα (prefecture)</label>
        <select id="pref"></select>
      </div>
    </div>
    <div class="deptlist" id="deptlist"></div>
    <div class="checkline">
      <input type="checkbox" id="selall" checked>
      <label for="selall" style="margin:0;color:var(--text)">Check all departments in this prefecture</label>
    </div>
  </div>

  <div class="card">
    <h2>When to alert</h2>
    <div class="row-4">
      <div>
        <label for="days">Alert window (days)</label>
        <input type="number" id="days" value="5" min="1" max="180">
      </div>
      <div>
        <label for="interval">Scan every (min)</label>
        <input type="number" id="interval" value="5" min="1" max="120">
      </div>
      <div class="checkline" style="margin-top:22px">
        <input type="checkbox" id="onlynew" checked>
        <label for="onlynew" style="margin:0;color:var(--text)">Only new slots</label>
      </div>
      <div class="checkline" style="margin-top:22px">
        <input type="checkbox" id="stoponfound">
        <label for="stoponfound" style="margin:0;color:var(--text)">Stop when found</label>
      </div>
    </div>
  </div>

  <div class="card controls">
    <button class="primary" id="startBtn">Start watching</button>
    <button class="danger" id="stopBtn" disabled>Stop</button>
    <button id="beepBtn">Test beep</button>
  </div>

  <div class="status" id="status">
    <div class="pulse"></div>
    <span id="statusText">Idle — fill in the token and press Start.</span>
    <span class="count" id="countdown"></span>
  </div>

  <div id="urgentBox"></div>
  <div id="nearestBox"></div>

  <div class="log" id="log">Log will appear here.</div>
</div>

/* ==== element refs ==== */
const $ = id => document.getElementById(id);

const sessionLine = $("sessionLine");

/* ==== token acquisition ====
   The radar runs on the eid.gov.gr page, where the site's ctaf framework
   exposes the login token. The Authorization header is "ctaf2 " + ctaf.loginToken,
   and loginToken is a LIVE property — reading it fresh each scan means we always
   use the current token, even after the site silently refreshes it. Checks both
   window.ctaf (when loaded via document.write) and window.parent.ctaf (when
   loaded as an iframe overlay). Falls back to a manual paste box if neither is
   reachable (e.g. the file opened standalone). */
function getCtaf() {
  try { if (window.parent && window.parent.ctaf) return window.parent.ctaf; } catch (e) {}
  try { if (window.ctaf) return window.ctaf; } catch (e) {}
  return null;
}
function getAuthToken() {
  const manual = $("token").value.trim();
  if (manual) return manual;
  const ctaf = getCtaf();
  if (ctaf && ctaf.loginToken) return "ctaf2 " + ctaf.loginToken;
  return null;
}
function refreshSessionStatus() {
  const ctaf = getCtaf();
  if (ctaf && ctaf.loginToken) {
    const name = ctaf.userDisplayName ? ` (${ctaf.userDisplayName})` : "";
    sessionLine.innerHTML = `<span style="color:var(--green)">●</span> Session detected${name} — token read automatically.`;
    $("token").style.display = "none";
    return true;
  }
  sessionLine.innerHTML = `<span style="color:var(--amber)">●</span> No live session found. Paste the Authorization token below (from the network tab, incl. the <b>ctaf2</b> prefix).`;
  $("token").style.display = "block";
  return false;
}

/* ==== cascading selects ==== */
function fillRegions() {
  regionSel.innerHTML = LABELS.map(r => `<option value="${r.id}">${r.name}</option>`).join("");
  fillPrefs();
}
function fillPrefs() {
  const region = LABELS.find(r => r.id == regionSel.value);
  prefSel.innerHTML = region.childs.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
  fillDepts();
}
function fillDepts() {
  const labelId = Number(prefSel.value);
  const depts = DEPARTMENTS.filter(d => d.labelId === labelId);
  deptList.innerHTML = depts.map(d => `
    <label class="dept">
      <input type="checkbox" value="${d.id}" ${$("selall").checked ? "checked" : ""}>
      <span>${d.name} <span class="addr">${d.address || ""}</span></span>
    </label>`).join("");
}
regionSel.addEventListener("change", fillPrefs);
prefSel.addEventListener("change", fillDepts);
$("selall").addEventListener("change", () =>
  deptList.querySelectorAll("input").forEach(cb => cb.checked = $("selall").checked));
fillRegions();

/* default to Rodopi if present */
(function presetRodopi() {
  const region = LABELS.find(r => r.childs.some(c => c.id === 2862));
  if (region) { regionSel.value = region.id; fillPrefs(); prefSel.value = 2862; fillDepts(); }
})();

/* ==== log ==== */
function log(msg, cls) {
  const t = new Date().toLocaleTimeString("el-GR");
  const line = document.createElement("div");
  if (cls) line.className = cls;
  line.textContent = `[${t}] ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

/* ==== beep ==== */
function playBeep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  [0, 600, 1200].forEach(delay => setTimeout(() => {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 800; osc.type = "sine";
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
  }, delay));
}
$("beepBtn").addEventListener("click", playBeep);

/* ==== API ==== */
async function checkDepartment(dept, authToken) {
  const response = await fetch("https://eid.gov.gr/appointments/api/PoliceFrontService/PD_Citizen_TimeslotsAvailable", {
    credentials: "include",
    headers: {
      "Accept": "application/json",
      "Content-Type": "application/json; charset=utf-8",
      "Authorization": authToken,
      "X-Requested-With": "XMLHttpRequest"
    },
    referrer: "https://eid.gov.gr/appointments",
    body: JSON.stringify({ departmentId: dept.id }),
    method: "POST",
    mode: "cors"
  });
  if (response.status === 401) return { unauthorized: true };
  if (!response.ok) return { error: "HTTP " + response.status };
  return { data: await response.json() };
}

      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:4px">
        Nearest available (outside ${days}-day window)</div>
      <div class="when">${fmtDate(a.date)} — ${a.timeZone}</div>
      <div>${a.department}</div>
      <div class="addr">${a.address || ""}</div>
    </div>` : "";
}

/* ==== scan ==== */
async function scan() {
  const authToken = getAuthToken();
  if (!authToken) {
    log("No token available — session not detected and nothing pasted.", "err");
    setStatus("dead", "No token — see Session box.");
    refreshSessionStatus();
    return stopWatching();
  }
  const days = Number($("days").value) || 5;
  const onlyNew = $("onlynew").checked;
  const stopOnFound = $("stoponfound").checked;
  const deadline = new Date(Date.now() + days * 864e5);
  const chosen = [...deptList.querySelectorAll("input:checked")]
    .map(cb => DEPARTMENTS.find(d => d.id === Number(cb.value)));

  if (!chosen.length) { log("No departments selected.", "warn"); return stopWatching(); }

  setStatus("scanning", `Scanning ${chosen.length} departments…`);
  const all = [];

  for (const dept of chosen) {
    if (!running) return;
    let result;
    try {
      result = await checkDepartment(dept, authToken);
    } catch (e) {
      log(`Network/CORS failure on ${dept.name}: ${e.message}`, "err");
      showBanner(`<b>Request blocked.</b> The radar must run <b>inside</b> the eid.gov.gr page
        so it shares the session. Open eid.gov.gr/appointments while logged in and launch the
        radar with the one-line loader (see the README), rather than opening this file directly.`);
      setStatus("dead", "Blocked — must run inside eid.gov.gr.");
      return stopWatching();
    }
    if (result.unauthorized) {
      log("401 Unauthorized — session token rejected.", "err");
      showBanner(`<b>Session expired (401).</b> Your login on eid.gov.gr has timed out.
        Reload the appointments page, log in again, and re-open the radar. (If you pasted a
        manual token, grab a fresh one from the network tab.)`);
      setStatus("dead", "Session expired — monitor stopped.");
      playBeep();
      return stopWatching();
    }
    if (result.error) { log(`${dept.name}: ${result.error}`, "warn"); continue; }

    const slots = (result.data.availableDates || []).filter(s => s.percentAvailable > 0);
    slots.forEach(s => all.push({
      department: dept.name, address: dept.address,
      date: s.onDate,
      timeZone: TIMEZONES[s.zoneNum] || "Zone " + s.zoneNum,
      key: `${dept.id}|${s.onDate}|${s.zoneNum}`
    }));
    await new Promise(r => setTimeout(r, 300));
  }

  all.sort((a, b) => new Date(a.date) - new Date(b.date));
  const urgent = all.filter(a => new Date(a.date) <= deadline);
  const toAlert = onlyNew ? urgent.filter(a => !seenSlots.has(a.key)) : urgent;
  urgent.forEach(a => seenSlots.add(a.key));

  log(`Scan done: ${all.length} open slots, ${urgent.length} within ${days} days` +
      (onlyNew ? ` (${toAlert.length} new)` : ""), "ok");

  renderUrgent(urgent);
  renderNearest(!urgent.length && all.length ? all[0] : null, days);

  if (toAlert.length) {
    playBeep();
    setStatus("alert", `${urgent.length} slot(s) inside the ${days}-day window — book now!`);
    if (stopOnFound) {
      log("Stop-on-found is on — monitor stopped. Go book it: https://eid.gov.gr/appointments", "warn");
      return stopWatching(true);
    }
  }
}

/* ==== loop ==== */
async function loop() {
  await scan();
  if (!running) return;
  const mins = Math.max(1, Number($("interval").value) || 5);
  nextScanAt = Date.now() + mins * 60000;
  if (statusEl.className.indexOf("alert") < 0)
    setStatus("waiting", "Watching — next sweep in");
  timer = setTimeout(loop, mins * 60000);
}

function startWatching() {
  if (!getAuthToken()) {
    log("No session detected and no token pasted — cannot start.", "warn");
    refreshSessionStatus();
    return;
  }
  hideBanner();
  running = true;
  startBtn.disabled = true; stopBtn.disabled = false;
  seenSlots.clear();
  log("Monitor started.");
  tick = setInterval(() => {
    if (!running || !nextScanAt) return countdownEl.textContent = "";
    const s = Math.max(0, Math.round((nextScanAt - Date.now()) / 1000));
    countdownEl.textContent = statusEl.className.includes("waiting")
      ? `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}` : "";
  }, 1000);
  loop();
}

function stopWatching(keepStatus) {
  running = false;
  clearTimeout(timer); clearInterval(tick);
  nextScanAt = 0; countdownEl.textContent = "";
  startBtn.disabled = false; stopBtn.disabled = true;
  if (!keepStatus && !statusEl.className.includes("dead"))
    setStatus("", "Stopped.");
  log("Monitor stopped.");
}

startBtn.addEventListener("click", startWatching);
stopBtn.addEventListener("click", () => stopWatching());

/* detect session on load, and keep the status line honest */
refreshSessionStatus();
setInterval(refreshSessionStatus, 5000);
</script>
</body>
</html>
